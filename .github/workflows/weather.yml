name: 📡 Pro Sequential Weather

on:
  schedule:
    - cron: '30 0,6,12,18 * * *' # Trigger 4x a day
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Execute Weather Sequence
        run: |
          # 1. Configuration & Data Fetch
          # Using %C (Condition), %t (Temp), %w (Wind)
          S_RAW=$(curl -s "wttr.in/Shamli?format=%C|%t|%w")
          M_RAW=$(curl -s "wttr.in/Mumbai?format=%C|%t|%w")

          # 2. Logic for Telegram Animated Emojis
          get_anim() {
            local c=$(echo "$1" | tr '[:upper:]' '[:lower:]')
            if [[ "$c" == *"thunder"* ]]; then echo "⛈️";
            elif [[ "$c" == *"rain"* ]] || [[ "$c" == *"drizzle"* ]]; then echo "🌧️";
            elif [[ "$c" == *"snow"* ]] || [[ "$c" == *"ice"* ]]; then echo "❄️";
            elif [[ "$c" == *"smoke"* ]] || [[ "$c" == *"haze"* ]] || [[ "$c" == *"fog"* ]]; then echo "🌫️";
            elif [[ "$c" == *"cloud"* ]] || [[ "$c" == *"overcast"* ]]; then echo "☁️";
            elif [[ "$c" == *"sun"* ]] || [[ "$c" == *"clear"* ]]; then echo "☀️";
            else echo "📡"; fi
          }

          # Process Shamli
          S
