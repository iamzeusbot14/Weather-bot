name: 📡 Nothing OS Dot-Matrix Pro

on:
  schedule:
    # Triggers once daily at 02:30 UTC (08:00 AM IST)
    - cron: '30 2 * * *'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Execute Dot-Matrix Sequence
        run: |
          # 1. Logic for Animated Emojis
          get_anim() {
            local c=$(echo "$1" | tr '[:upper:]' '[:lower:]')
            if [[ "$c" == *"thunder"* ]]; then echo "⛈️";
            elif [[ "$c" == *"rain"* ]] || [[ "$c" == *"drizzle"* ]]; then echo "🌧️";
            elif [[ "$c" == *"smoke"* ]] || [[ "$c" == *"haze"* ]] || [[ "$c" == *"fog"* ]]; then echo "🌫️";
            elif [[ "$c" == *"cloud"* ]]; then echo "☁️";
            elif [[ "$c" == *"sun"* ]] || [[ "$c" == *"clear"* ]]; then echo "☀️";
            else echo "📡"; fi
          }

          # 2. FIXED Nothing OS Glyph Progress Bar
          get_bar() {
            local raw_val=$(echo "$1" | sed 's/[^0-9.]//g')
            local p=$(printf "%.0f" "$raw_val" 2>/dev/null || echo 0)
            
            local filled=$(( (p + 5) / 10 ))
            if [ $filled -gt 10 ]; then filled=10; fi
            
            local bar=""
            for i in {1..10}; do
              if [ $i -le $filled ]; then bar+="⠿"; else bar+="⠂"; fi
            done
            echo "$bar"
          }

          # 3. Function to Send Dot-Matrix Report
          send_nothing_report() {
            local city=$1; local emoji=$2; local stat=$3; local temp=$4;
            local wind=$5; local humid=$6; local rain=$7;

            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" -d text="$emoji"

            BAR=$(get_bar "$rain")

            REPORT="<b>$city</b>%0A"
            REPORT+="<code>⠶⠶⠶⠶⠶⠶⠶⠶⠶⠶⠶⠶⠶⠶⠶⠶⠶⠶⠶⠶⠶⠶⠶</code>%0A"
            REPORT+="<code>STATUS ❯ $stat</code>%0A"
            REPORT+="<code>TEMP   ❯ $temp</code>%0A"
            REPORT+="<code>WIND   ❯ $wind</code>%0A"
            REPORT+="<code>HUMID  ❯ $humid</code>%0A"
            REPORT+="<code>PRECIP ❯ $rain</code>%0A"
            REPORT+="<code>$BAR</code>%0A"
            REPORT+="<code>⠴⠴⠴⠴⠴⠴⠴⠴⠴⠴⠴⠴⠴⠴⠴⠴⠴⠴⠴⠴⠴⠴⠴</code>"

            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" -d text="$REPORT" -d parse_mode="HTML"
          }

          # 4. Fetch and Run
          S_RAW=$(curl -s "wttr.in/Shamli?format=%C|%t|%w|%h|%p")
          send_nothing_report "SHAMLI . UP" "$(get_anim "$(echo $S_RAW | cut -d'|' -f1)")" \
            "$(echo $S_RAW | cut -d'|' -f1)" "$(echo $S_RAW | cut -d'|' -f2 | xargs)" \
            "$(echo $S_RAW | cut -d'|' -f3 | xargs)" "$(echo $S_RAW | cut -d'|' -f4 | xargs)" \
            "$(echo $S_RAW | cut -d'|' -f5 | xargs)"

          sleep 2

          M_RAW=$(curl -s "wttr.in/Mumbai?format=%C|%t|%w|%h|%p")
          send_nothing_report "MUMBAI . MH" "$(get_anim "$(echo $M_RAW | cut -d'|' -f1)")" \
            "$(echo $M_RAW | cut -d'|' -f1)" "$(echo $M_RAW | cut -d'|' -f2 | xargs)" \
            "$(echo $M_RAW | cut -d'|' -f3 | xargs)" "$(echo $M_RAW | cut -d'|' -f4 | xargs)" \
            "$(echo $M_RAW | cut -d'|' -f5 | xargs)"
