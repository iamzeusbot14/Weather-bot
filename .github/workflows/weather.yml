name: 🌍 Global Weather Reporter

on:
  schedule:
    # Triggers at 00:30, 06:30, 12:30, and 18:30 UTC
    # (Approx. 6 AM, 12 PM, 6 PM, 12 AM IST)
    - cron: '30 0,6,12,18 * * *'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and Format Weather
        run: |
          # 1. Fetch data for both cities (format 3 is clean: "City: Condition Temp")
          SHAMLI=$(curl -s "wttr.in/Shamli?format=3")
          MUMBAI=$(curl -s "wttr.in/Mumbai?format=3")

          # 2. Determine Greeting
          HOUR=$(date +%H)
          if [ $HOUR -lt 12 ]; then GREET="<b>Good Morning!</b> 🌅";
          elif [ $HOUR -lt 17 ]; then GREET="<b>Good Afternoon!</b> ☀️";
          elif [ $HOUR -lt 21 ]; then GREET="<b>Good Evening!</b> 🌆";
          else GREET="<b>Good Night!</b> 🌙"; fi

          # 3. Build the Eye-Pleasing Message
          # We use HTML tags like <b> and <code> for a better UI
          MESSAGE="$GREET%0A%0A"
          MESSAGE+="─── 📍 <b>LOCATIONS</b> ───%0A"
          MESSAGE+="🏙 <code>$SHAMLI</code>%0A"
          MESSAGE+="🏙 <code>$MUMBAI</code>%0A"
          MESSAGE+="─────────────────%0A%0A"
          MESSAGE+="✨ <i>Stay Sharp, Z E U S</i>"

          # 4. Send to Telegram
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="$MESSAGE" \
            -d parse_mode="HTML"
