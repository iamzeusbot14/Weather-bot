name: 📡 Pure Dot Weather

on:
  schedule:
    - cron: '30 0,6,12,18 * * *'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and Build Dot Icons
        run: |
          # 1. Fetch data for Shamli & Mumbai
          S_DATA=$(curl -s "wttr.in/Shamli?format=%C|%t|%w")
          M_DATA=$(curl -s "wttr.in/Mumbai?format=%C|%t|%w")

          # 2. Logic for Pure Dot Icons (7x5 Grid)
          get_icon() {
            local cond=$(echo "$1" | tr '[:upper:]' '[:lower:]')
            if [[ "$cond" == *"sun"* ]] || [[ "$cond" == *"clear"* ]]; then
              # Sunny / Clear Icon
              echo -e "   . . .   \n . . . . . \n . . . . . \n . . . . . \n   . . .   "
            elif [[ "$cond" == *"cloud"* ]] || [[ "$cond" == *"haze"* ]] || [[ "$cond" == *"overcast"* ]]; then
              # Cloud Icon
              echo -e "           \n   . . .   \n . . . . . \n . . . . . \n           "
            elif [[ "$cond" == *"rain"* ]] || [[ "$cond" == *"drizzle"* ]]; then
              # Rain Icon
              echo -e " . . . . . \n           \n  .   .    \n    .   .  \n  .   .    "
            else
              # Wind / Other
              echo -e " . . . . . \n .       . \n . . . . . \n .       . \n . . . . . "
            fi
          }

          # 3. Parse and Generate
          S_COND=$(echo $S_DATA | cut -d'|' -f1)
          S_ICON=$(get_icon "$S_COND")
          
          M_COND=$(echo $M_DATA | cut -d'|' -f1)
          M_ICON=$(get_icon "$M_COND")

          # 4. Build the Message
          MSG="<b>WEATHER . REPORT</b>%0A"
          MSG+="<code>...........................</code>%0A%0A"
          
          MSG+="📍 <b>SHAMLI</b>%0A"
          MSG+="<code>$S_ICON</code>%0A"
          MSG+="<code>STATUS ❯ $S_COND</code>%0A"
          MSG+="<code>TEMP   ❯ $(echo $S_DATA | cut -d'|' -f2)</code>%0A%0A"

          MSG+="📍 <b>MUMBAI</b>%0A"
          MSG+="<code>$M_ICON</code>%0A"
          MSG+="<code>STATUS ❯ $M_COND</code>%0A"
          MSG+="<code>TEMP   ❯ $(echo $M_DATA | cut -d'|' -f2)</code>%0A%0A"
          
          MSG+="<code>...........................</code>"

          # 5. Send to Telegram
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="$MSG" \
            -d parse_mode="HTML"
