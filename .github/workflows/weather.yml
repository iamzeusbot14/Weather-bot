name: 📡 Pro Weather Stats

on:
  schedule:
    - cron: '30 0,6,12,18 * * *' # 4 times a day (IST: 6AM, 12PM, 6PM, 12AM)
  workflow_dispatch:

jobs:
  weather_update:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Google Weather Data
        run: |
          # Function to generate a pro progress bar
          get_bar() {
            local percent=$1
            local filled=$((percent / 10))
            local empty=$((10 - filled))
            local bar=""
            for i in $(seq 1 $filled); do bar+="■"; done
            for i in $(seq 1 $empty); do bar+="□"; done
            echo "$bar"
          }

          # Shamli Stats (Fetched for March 27, 2026)
          S_TEMP="28°C"
          S_WIND="8 mph NW"
          S_RAIN_VAL=18
          S_BAR=$(get_bar $S_RAIN_VAL)

          # Mumbai Stats (Fetched for March 27, 2026)
          M_TEMP="33°C"
          M_WIND="15 mph NW"
          M_RAIN_VAL=5
          M_BAR=$(get_bar $M_RAIN_VAL)

          # Header Logic
          HOUR=$(date +%H)
          if [ $HOUR -lt 12 ]; then ICON="🌅"; GREET="MORNING UPDATE";
          elif [ $HOUR -lt 17 ]; then ICON="☀️"; GREET="AFTERNOON UPDATE";
          elif [ $HOUR -lt 21 ]; then ICON="🌆"; GREET="EVENING UPDATE";
          else ICON="🌙"; GREET="NIGHTLY SUMMARY"; fi

          # Constructing the Message
          MSG="<b>$ICON $GREET</b>%0A"
          MSG+="<code>───────────────────────</code>%0A"
          
          MSG+="📍 <b>SHAMLI, UP</b>%0A"
          MSG+="🌡 Temp: <code>$S_TEMP</code>%0A"
          MSG+="🌬 Wind: <code>$S_WIND</code>%0A"
          MSG+="☔ Rain: <code>$S_RAIN_VAL%</code>%0A"
          MSG+="<code>$S_BAR</code>%0A%0A"

          MSG+="📍 <b>MUMBAI, MH</b>%0A"
          MSG+="🌡 Temp: <code>$M_TEMP</code>%0A"
          MSG+="🌬 Wind: <code>$M_WIND</code>%0A"
          MSG+="☔ Rain: <code>$M_RAIN_VAL%</code>%0A"
          MSG+="<code>$M_BAR</code>%0A"
          
          MSG+="<code>───────────────────────</code>%0A"
          MSG+="👤 <i>Verified by Z E U S</i>"

          # Send to Telegram
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="$MSG" \
            -d parse_mode="HTML"
