name: 📡 Telegram Animated Weather

on:
  schedule:
    - cron: '30 0,6,12,18 * * *'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and Build Animated Report
        run: |
          # 1. Fetch live data for Shamli & Mumbai
          S_DATA=$(curl -s "wttr.in/Shamli?format=%C|%t")
          M_DATA=$(curl -s "wttr.in/Mumbai?format=%C|%t")

          # 2. Map conditions to Telegram's Animated Emoji set
          get_animated() {
            local cond=$(echo "$1" | tr '[:upper:]' '[:lower:]')
            if [[ "$cond" == *"sun"* ]] || [[ "$cond" == *"clear"* ]]; then
              echo "☀️" # Animated Sun
            elif [[ "$cond" == *"cloud"* ]] || [[ "$cond" == *"overcast"* ]]; then
              echo "☁️" # Animated Cloud
            elif [[ "$cond" == *"rain"* ]] || [[ "$cond" == *"shower"* ]]; then
              echo "🌧️" # Animated Rain
            elif [[ "$cond" == *"thunder"* ]]; then
              echo "⛈️" # Animated Storm
            elif [[ "$cond" == *"snow"* ]]; then
              echo "❄️" # Animated Snow
            else
              echo "🌫️" # Animated Mist/Haze
            fi
          }

          S_ICON=$(get_animated "$(echo $S_DATA | cut -d'|' -f1)")
          M_ICON=$(get_animated "$(echo $M_DATA | cut -d'|' -f1)")

          # 3. Build the UI with your Dot-Matrix Style
          MSG="<b>WEATHER . REPORT</b>%0A"
          MSG+="<code>...........................</code>%0A%0A"
          
          MSG+="📍 <b>SHAMLI</b>%0A"
          MSG+="$S_ICON%0A"
          MSG+="<code>STATUS ❯ $(echo $S_DATA | cut -d'|' -f1)</code>%0A"
          MSG+="<code>TEMP   ❯ $(echo $S_DATA | cut -d'|' -f2)</code>%0A%0A"

          MSG+="📍 <b>MUMBAI</b>%0A"
          MSG+="$M_ICON%0A"
          MSG+="<code>STATUS ❯ $(echo $M_DATA | cut -d'|' -f1)</code>%0A"
          MSG+="<code>TEMP   ❯ $(echo $M_DATA | cut -d'|' -f2)</code>%0A%0A"
          
          MSG+="<code>...........................</code>"

          # 4. Send via API
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="$MSG" \
            -d parse_mode="HTML"
